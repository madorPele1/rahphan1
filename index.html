<head>

    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Home Screen Styles */
        #home-screen {
            display: block;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-category {
            background-color: var(--white);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .btn-category:active {
            transform: scale(0.98);
            background-color: var(--primary-color);
            color: var(--white);
        }

        /* Detail Screen Styles */
        #detail-screen {
            display: none;
            background-color: var(--white);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            position: sticky;
            top: 0;
            background-color: var(--white);
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            z-index: 10;
        }

        .content-area {
            padding: 20px;
            font-size: 16px;
            white-space: pre-wrap; /* Maintains spacing from source */
        }

        .content-title {
            color: var(--accent-color);
            font-size: 22px;
            margin-bottom: 15px;
            border-right: 4px solid var(--accent-color);
            padding-right: 10px;
        }

        .btn-back {
            display: block;
            width: 100%;
            background-color: var(--secondary-color);
            color: var(--white);
            text-align: center;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 30px;
            cursor: pointer;
        }

        .citation {
            font-size: 0.8em;
            color: #888;
            vertical-align: super;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .btn-category { padding: 18px; font-size: 17px; }
        }
    </style>
</head>
<body>

<div class="container" id="home-screen">
    <h1>נוהל הפעלת רחפן EVO</h1>
    <div class="category-list">

        <button class="btn-category" onclick="showCategory('security')">הוראות ביטחון מידע</button>
        <button class="btn-category" onclick="showCategory('appendices')">נספחים</button>

    </div>
</div>

<div id="detail-screen">

</div>
