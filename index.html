<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>נוהל הפעלת רחפן EVO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #2a3447;
    --accent: #e8a020;
    --accent2: #f0c060;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --danger: #f85149;
    --success: #3fb950;
    --info: #58a6ff;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── SCREENS ─── */
  .screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* ─── HOME SCREEN ─── */
  #home {
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .home-hero {
    position: relative;
    padding: 52px 24px 36px;
    background: linear-gradient(160deg, #1a2236 0%, #0d1117 60%);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .home-hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -80px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .home-hero::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(88,166,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,160,32,0.15);
    border: 1px solid rgba(232,160,32,0.3);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .badge::before { content: '◈'; font-size: 10px; }

  .home-title {
    font-size: 28px;
    font-weight: 900;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
    position: relative;
  }

  .home-title span {
    color: var(--accent);
  }

  .home-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    line-height: 1.6;
    position: relative;
  }

  .drone-icon {
    display: block;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent) 0%, #c87010 100%);
    border-radius: 14px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 20px rgba(232,160,32,0.3);
  }

  /* ─── CATEGORY LIST ─── */
  .categories {
    padding: 24px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .cat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 4px;
    margin-bottom: 4px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: right;
    position: relative;
    overflow: hidden;
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02));
    opacity: 0;
    transition: opacity 0.18s;
  }

  .cat-btn:active {
    transform: scale(0.97);
    border-color: var(--accent);
  }

  .cat-btn:active::before { opacity: 1; }

  .cat-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .cat-info { flex: 1; }

  .cat-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .cat-desc {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .cat-arrow {
    color: var(--text-dim);
    font-size: 16px;
    flex-shrink: 0;
  }

  /* Category color themes */
  .c-scan  .cat-icon { background: rgba(88,166,255,0.15); }
  .c-build .cat-icon { background: rgba(63,185,80,0.15); }
  .c-safe  .cat-icon { background: rgba(248,81,73,0.15); }
  .c-sec   .cat-icon { background: rgba(232,160,32,0.15); }
  .c-app   .cat-icon { background: rgba(188,140,255,0.15); }
  .c-fault .cat-icon { background: rgba(240,192,96,0.15); }

  .c-scan:active  { border-color: var(--info) !important; }
  .c-build:active { border-color: var(--success) !important; }
  .c-safe:active  { border-color: var(--danger) !important; }
  .c-sec:active   { border-color: var(--accent) !important; }
  .c-app:active   { border-color: #bc8cff !important; }
  .c-fault:active { border-color: var(--accent2) !important; }

  /* ─── CONTENT SCREEN ─── */
  #content {
    background: var(--bg);
    animation: slideIn 0.25s ease forwards;
  }

  @keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  .content-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .back-btn:active {
    transform: scale(0.92);
    background: var(--surface2);
  }

  .header-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .content-body {
    padding: 24px 20px 80px;
    line-height: 1.85;
    flex: 1;
    overflow-y: auto;
  }

  /* ─── CONTENT TYPOGRAPHY ─── */
  .content-body h2 {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    position: relative;
  }

  .content-body h2::after {
    content: '';
    position: absolute;
    bottom: -2px; right: 0;
    width: 48px; height: 2px;
    background: var(--accent);
  }

  .content-body h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent2);
    margin: 24px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .content-body h3::before {
    content: '';
    width: 4px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .content-body p {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .content-body ul {
    list-style: none;
    margin-bottom: 16px;
  }

  .content-body ul li {
    font-size: 14px;
    color: var(--text-muted);
    padding: 6px 0 6px 0;
    border-bottom: 1px solid rgba(42,52,71,0.5);
    display: flex;
    gap: 10px;
    align-items: flex-start;
    line-height: 1.6;
  }

  .content-body ul li::before {
    content: '›';
    color: var(--accent);
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .content-body ol {
    list-style: none;
    counter-reset: ol-counter;
    margin-bottom: 16px;
  }

  .content-body ol li {
    counter-increment: ol-counter;
    font-size: 14px;
    color: var(--text-muted);
    padding: 8px 0;
    border-bottom: 1px solid rgba(42,52,71,0.5);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    line-height: 1.6;
  }

  .content-body ol li::before {
    content: counter(ol-counter);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .warn-card {
    background: rgba(248,81,73,0.08);
    border-color: rgba(248,81,73,0.25);
  }

  .warn-card .card-title { color: var(--danger); }

  .info-card {
    background: rgba(88,166,255,0.06);
    border-color: rgba(88,166,255,0.2);
  }

  .info-card .card-title { color: var(--info); }

  .tip-card {
    background: rgba(232,160,32,0.07);
    border-color: rgba(232,160,32,0.22);
  }

  .tip-card .card-title { color: var(--accent2); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* phone number styling */
  .phone-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(42,52,71,0.5);
    font-size: 14px;
  }

  .phone-item .label { color: var(--text-muted); }
  .phone-item .number {
    color: var(--info);
    font-family: monospace;
    font-size: 14px;
    font-weight: 600;
    direction: ltr;
  }

  /* equipment list */
  .equipment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .equip-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .equip-item::before { content: '✓'; color: var(--success); font-size: 12px; }

  /* spec rows */
  .spec-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid rgba(42,52,71,0.5);
    gap: 12px;
  }

  .spec-label { font-size: 13px; color: var(--text-muted); flex: 1; }
  .spec-value { font-size: 13px; color: var(--text); font-weight: 600; text-align: left; direction: ltr; }

  /* bottom back button */
  .bottom-back {
    position: fixed;
    bottom: 0; right: 0; left: 0;
    padding: 12px 20px 28px;
    background: linear-gradient(transparent, rgba(13,17,23,0.98) 40%);
    z-index: 50;
  }

  .bottom-back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 14px;
    width: 100%;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Heebo', sans-serif;
  }

  .bottom-back-btn:active {
    background: var(--surface2);
    transform: scale(0.98);
  }

  /* highlight text */
  strong {
    color: var(--text);
    font-weight: 700;
  }

  .highlight { color: var(--accent); font-weight: 600; }
  .highlight-danger { color: var(--danger); font-weight: 600; }
  .highlight-info { color: var(--info); font-weight: 600; }
</style>
</head>
<body>

<!-- ═══════════════════ HOME SCREEN ═══════════════════ -->
<div id="home" class="screen active">
  <div class="home-hero">
    <div class="drone-icon">🚁</div>
    <div class="badge">מסמך נהלים מבצעי</div>
    <div class="home-title">נוהל הפעלת<br>רחפן <span>EVO</span></div>
    <div class="home-subtitle">EVO Max 4T/N &nbsp;·&nbsp; מרץ 2026</div>
  </div>

  <div class="categories">
    <div class="cat-label">בחר נושא</div>

    <button class="cat-btn c-scan" onclick="showPage('scan')">
      <div class="cat-icon">🔍</div>
      <div class="cat-info">
        <div class="cat-name">טכניקת סריקה</div>
        <div class="cat-desc">הכנות, ביצוע, עיתוי וסיום</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn c-build" onclick="showPage('build')">
      <div class="cat-icon">🔧</div>
      <div class="cat-info">
        <div class="cat-name">מדריך הרכבה מהיר</div>
        <div class="cat-desc">טעינה, הכנסה ופתיחת זרועות</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn c-safe" onclick="showPage('safety')">
      <div class="cat-icon">⚠️</div>
      <div class="cat-info">
        <div class="cat-name">הוראות בטיחות</div>
        <div class="cat-desc">27 כללי תפעול ובטיחות</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn c-sec" onclick="showPage('security')">
      <div class="cat-icon">🔒</div>
      <div class="cat-info">
        <div class="cat-name">הוראות ביטחון מידע</div>
        <div class="cat-desc">רכש, שימוש, אחסון כרטיס זיכרון</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn c-app" onclick="showPage('appendix')">
      <div class="cat-icon">📋</div>
      <div class="cat-info">
        <div class="cat-name">נספחים</div>
        <div class="cat-desc">ספר טלפונים, ציוד, נתוני טיסה</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn c-fault" onclick="showPage('fault')">
      <div class="cat-icon">⚡</div>
      <div class="cat-info">
        <div class="cat-name">סד״פ תקלות</div>
        <div class="cat-desc">נתק, GPS Spoofing, קפיאת וידאו</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>
  </div>
</div>

<!-- ═══════════════════ CONTENT SCREEN ═══════════════════ -->
<div id="content" class="screen">
  <div class="content-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div id="header-icon" class="header-icon"></div>
    <div id="header-title" class="header-title"></div>
  </div>

  <div class="content-body" id="content-body"></div>

  <div class="bottom-back">
    <button class="bottom-back-btn" onclick="goHome()">‹ חזרה למסך הראשי</button>
  </div>
</div>

<script>
const pages = {

  scan: {
    icon: '🔍',
    iconBg: 'rgba(88,166,255,0.15)',
    title: 'טכניקת סריקה',
    html: `
      <h2>טכניקת סריקה</h2>

      <h3>עיתוי</h3>
      <ul>
        <li>בהגעה לזירת האירוע על מנת למפות את זירת ההרס</li>

        <li>מזג אוויר - ללא צפי למשקעים, מגבלות רוח וטמפרטורה – בהתאם לסוג הרחפן.</li>
        <li>סוללות טעונות לרמה שמאפשרת את ביצוע המשימה.</li>

      </ul>

      <h3>סד"כ מבצע</h3>
      <div class="card info-card">
        <div class="card-title">📌 הרכב</div>
        <p style="font-size:14px;color:var(--text-muted);margin:0;">סריקות בעזרת רחפן יתבצעו בחוליה של 2 מטיסים שעברו הכשרה מתאימה– צופה ומטיס</p>

      <div class="divider"></div>
      <h2>טכניקת סריקה - המשך</h2>

      <h3>ביצוע - בהתאם לסוג המשימה</h3>

      <div class="card tip-card">

        <li>אם הרחפן כבר עבר לנתק תקשורת אחרי זיוף GNSS רוב הסיכויים שהוא התרסק.</li>

      <h3>איך מזהים</h3>
      <ul>
        <li>הוידאו מהרחפן הופך להיות אפור או תקוע על תמונה, הטלמטריה עדיין זזה.</li>

        <li>אם הוידאו עדיין תקוע חזרה לפי טלמטריה עד לנקודת הנחיתה, נחיתה בקשר עין,</li>
        <li>אם יש צורך והמקום מאפשר מבצעית יציאה ממצב חשאי לזיהוי טוב יותר של הרחפן.</li>

    `
  }
};

function showPage(key) {
  const page = pages[key];
  if (!page) return;

  document.getElementById('header-title').textContent = page.title;

  const iconEl = document.getElementById('header-icon');
  iconEl.textContent = page.icon;
  iconEl.style.background = page.iconBg;

  document.getElementById('content-body').innerHTML = page.html;

  document.getElementById('home').classList.remove('active');
  const contentEl = document.getElementById('content');
  contentEl.classList.add('active');
  contentEl.scrollTop = 0;

  // reset animation
  contentEl.style.animation = 'none';
  requestAnimationFrame(() => {
    contentEl.style.animation = 'slideIn 0.25s ease forwards';
  });
}

function goHome() {
  document.getElementById('content').classList.remove('active');
  document.getElementById('home').classList.add('active');
  window.scrollTo(0, 0);
}
</script>
