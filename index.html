<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>נוהל הפעלת רחפן EVO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f8fa;
    --surface2: #eef0f4;
    --border: #e2e5eb;
    --accent: #e85d04;
    --accent2: #f48c06;
    --text-primary: #1a1d23;
    --text-secondary: #4b5563;
    --text-muted: #9ca3af;
    --scan: #0284c7;
    --build: #7c3aed;
    --safety: #dc2626;
    --intel: #059669;
    --appendix: #0ea5e9;
    --fault: #d97706;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Heebo', sans-serif;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    min-height: 100vh;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; flex-direction: column; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== HOME SCREEN ===== */
  #home {
    background: var(--bg);
  }

  .home-header {
    position: relative;
    padding: 48px 24px 28px;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(160deg, #fff8f4 0%, #ffffff 60%);
  }

  .home-header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,93,4,0.1);
    border: 1px solid rgba(232,93,4,0.25);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .home-title {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .home-title span {
    color: var(--accent);
  }

  .home-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ===== DRONE VISUAL — simple SVG drone icon, no animation ===== */
  .drone-visual {
    width: 100%;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fff8f4 0%, #ffffff 100%);
    border-bottom: 1px solid var(--border);
  }

  .drone-svg {
    width: 80px;
    height: 80px;
    opacity: 0.85;
  }

  /* ===== CATEGORY GRID ===== */
  .categories {
    padding: 20px 16px 36px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 17px 18px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: right;
    position: relative;
    overflow: hidden;
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 0 14px 14px 0;
    background: var(--cat-color, var(--accent));
  }

  .cat-btn:active {
    transform: scale(0.98);
    background: var(--surface2);
  }

  .cat-icon {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    background: rgba(0,0,0,0.04);
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.06);
  }

  .cat-info { flex: 1; }

  .cat-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 3px;
  }

  .cat-desc {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .cat-arrow {
    color: var(--text-muted);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ===== CONTENT SCREEN ===== */
  #content {
    background: var(--bg);
    overflow-y: auto;
    height: 100vh;
  }

  .content-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
    color: var(--text-primary);
  }

  .back-btn:active { background: var(--surface2); transform: scale(0.95); }

  .content-header-info { flex: 1; }

  .content-header-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .content-header-cat {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .content-icon-header {
    font-size: 28px;
    flex-shrink: 0;
  }

  /* ===== CONTENT BODY ===== */
  .content-body {
    padding: 24px 18px 60px;
    flex: 1;
    overflow-y: auto;
  }

  .section-block {
    margin-bottom: 28px;
    animation: slideUp 0.4s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    width: 4px; height: 18px;
    background: var(--cat-color, var(--accent));
    border-radius: 2px;
    flex-shrink: 0;
  }

  .content-text {
    font-size: 15px;
    line-height: 1.85;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .info-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .info-card p {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.75;
    margin-bottom: 6px;
  }

  .info-card p:last-child { margin-bottom: 0; }

  .warning-card {
    background: rgba(220,38,38,0.06);
    border: 1px solid rgba(220,38,38,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .warning-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

  .warning-text {
    font-size: 14px;
    color: #b91c1c;
    line-height: 1.7;
    font-weight: 500;
  }

  .step-list { list-style: none; padding: 0; }

  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .step-item:last-child { border-bottom: none; }

  .step-num {
    width: 26px; height: 26px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .bullet-list { list-style: none; padding: 0; }

  .bullet-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    border-bottom: 1px solid rgba(226,229,235,0.6);
  }

  .bullet-item:last-child { border-bottom: none; }

  .bullet-dot {
    width: 7px; height: 7px;
    background: var(--cat-color, var(--accent));
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 9px;
  }

  .phone-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .phone-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .phone-label {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  .phone-number {
    font-size: 15px;
    font-weight: 700;
    color: var(--scan);
    direction: ltr;
    letter-spacing: 0.02em;
  }

  .spec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .spec-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .spec-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }

  .spec-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .fault-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .fault-header {
    padding: 14px 16px;
    background: rgba(217,119,6,0.07);
    border-bottom: 1px solid rgba(217,119,6,0.15);
    font-size: 15px;
    font-weight: 700;
    color: #b45309;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fault-body { padding: 14px 16px; }

  .fault-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .fault-section-title:first-child { margin-top: 0; }

  .fault-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .equipment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .equip-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .equip-dot {
    width: 8px; height: 8px;
    background: var(--appendix);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== ACCORDION ===== */
  .accordion-item {
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--surface);
  }

  .accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 18px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    background: var(--surface);
    user-select: none;
    gap: 10px;
    transition: background 0.15s;
  }

  .accordion-header:active {
    background: var(--surface2);
  }

  .accordion-arrow {
    font-size: 13px;
    color: var(--text-muted);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .accordion-item.open .accordion-arrow {
    transform: rotate(90deg);
  }

  .accordion-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.25s ease;
    padding: 0 16px;
  }

  .accordion-item.open .accordion-body {
    max-height: 2000px;
    padding: 0 16px 16px;
  }

  .accordion-title-text {
    flex: 1;
  }

  /* ===== BOTTOM BACK ===== */
  .bottom-back {
    padding: 14px 18px 30px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    position: sticky;
    bottom: 0;
  }

  .bottom-back-btn {
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text-primary);
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .bottom-back-btn:active { background: var(--surface2); transform: scale(0.98); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ============================================================
     HOME SCREEN
============================================================ -->
<div id="home" class="screen active">
  <div class="home-header">
    <div class="badge"><div class="badge-dot"></div> מרץ 2026</div>
    <h1 class="home-title">נוהל הפעלת רחפן <span>EVO</span></h1>
    <p class="home-subtitle">EVO Max 4T/N — מדריך מבצעי מלא</p>
  </div>

  <!-- Simple drone SVG icon, no complex animation -->
  <div class="drone-visual">
    <svg class="drone-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- arms -->
      <line x1="28" y1="38" x2="14" y2="24" stroke="#e85d04" stroke-width="3" stroke-linecap="round"/>
      <line x1="72" y1="38" x2="86" y2="24" stroke="#e85d04" stroke-width="3" stroke-linecap="round"/>
      <line x1="28" y1="62" x2="14" y2="76" stroke="#e85d04" stroke-width="3" stroke-linecap="round"/>
      <line x1="72" y1="62" x2="86" y2="76" stroke="#e85d04" stroke-width="3" stroke-linecap="round"/>
      <!-- propellers -->
      <ellipse cx="14" cy="21" rx="11" ry="4" fill="#f48c06" opacity="0.7"/>
      <ellipse cx="86" cy="21" rx="11" ry="4" fill="#f48c06" opacity="0.7"/>
      <ellipse cx="14" cy="79" rx="11" ry="4" fill="#f48c06" opacity="0.7"/>
      <ellipse cx="86" cy="79" rx="11" ry="4" fill="#f48c06" opacity="0.7"/>
      <!-- body -->
      <rect x="30" y="36" width="40" height="28" rx="8" fill="#1a1d23" stroke="#e2e5eb" stroke-width="1.5"/>
      <!-- camera -->
      <circle cx="50" cy="50" r="7" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="3.5" fill="#0284c7"/>
      <!-- center dot on props -->
      <circle cx="14" cy="21" r="2.5" fill="#e85d04"/>
      <circle cx="86" cy="21" r="2.5" fill="#e85d04"/>
      <circle cx="14" cy="79" r="2.5" fill="#e85d04"/>
      <circle cx="86" cy="79" r="2.5" fill="#e85d04"/>
    </svg>
  </div>

  <div class="categories">
    <button class="cat-btn" style="--cat-color: var(--scan)" onclick="showScreen('scan')">
      <div class="cat-icon">🔍</div>
      <div class="cat-info">
        <div class="cat-title">טכניקת סריקה</div>
        <div class="cat-desc">נהלים, הכנות וביצוע</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn" style="--cat-color: var(--build)" onclick="showScreen('build')">
      <div class="cat-icon">🔧</div>
      <div class="cat-info">
        <div class="cat-title">מדריך הרכבה מהיר</div>
        <div class="cat-desc">EVO Max 4T/N</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn" style="--cat-color: var(--safety)" onclick="showScreen('safety')">
      <div class="cat-icon">⚠️</div>
      <div class="cat-info">
        <div class="cat-title">הוראות בטיחות</div>
        <div class="cat-desc">27 כללי בטיחות חובה</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn" style="--cat-color: var(--intel)" onclick="showScreen('intel')">
      <div class="cat-icon">🔐</div>
      <div class="cat-info">
        <div class="cat-title">הוראות ביטחון מידע</div>
        <div class="cat-desc">שימוש מאושר ואבטחה</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn" style="--cat-color: var(--appendix)" onclick="showScreen('appendix')">
      <div class="cat-icon">📋</div>
      <div class="cat-info">
        <div class="cat-title">נספחים</div>
        <div class="cat-desc">ספר טלפונים, ציוד, נתוני טיסה</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>

    <button class="cat-btn" style="--cat-color: var(--fault)" onclick="showScreen('fault')">
      <div class="cat-icon">⚡</div>
      <div class="cat-info">
        <div class="cat-title">סד״פ תקלות</div>
        <div class="cat-desc">נתק תקשורת, GPS Spoofing, קפיאה</div>
      </div>
      <div class="cat-arrow">‹</div>
    </button>
  </div>
</div>

<!-- ============================================================
     CONTENT SCREEN
============================================================ -->
<div id="content" class="screen">
  <div class="content-header">
    <button class="back-btn" onclick="showHome()">›</button>
    <div class="content-header-info">
      <div class="content-header-title" id="content-title"></div>
      <div class="content-header-cat">נוהל הפעלת רחפן EVO</div>
    </div>
    <div class="content-icon-header" id="content-icon"></div>
  </div>
  <div class="content-body" id="content-body"></div>
  <div class="bottom-back">
    <button class="bottom-back-btn" onclick="showHome()">
      ‹ חזרה למסך הראשי
    </button>
  </div>
</div>

<script>
// Accordion helper — builds an accordion block
function accordion(title, bodyHTML) {
  return `
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-title-text">${title}</span>
        <span class="accordion-arrow">▶</span>
      </div>
      <div class="accordion-body">
        ${bodyHTML}
      </div>
    </div>
  `;
}

function toggleAccordion(header) {
  const item = header.parentElement;
  item.classList.toggle('open');
}

const SCREENS = {
  scan: {
    title: 'טכניקת סריקה',
    icon: '🔍',
    color: 'var(--scan)',
    render: () => `
      <div class="section-block" style="animation-delay:0.05s">
        <div class="section-title" style="--cat-color: var(--scan)">עיתוי</div>
        <div class="info-card">
          <ul class="bullet-list">
            <li class="bullet-item"><div class="bullet-dot" style="background:var(--scan)"></div><div>בהגעה לזירת האירוע על מנת למפות את זירת ההרס</div></li>
            <li class="bullet-item"><div class="bullet-dot" style="background:var(--scan)"></div><div>בעת סריקות לאיתור לכודים</div></li>
            <li class="bullet-item"><div class="bullet-dot" style="background:var(--scan)"></div><div>במהלך תרגולת סריקות והדממת אתר</div></li>
            <li class="bullet-item"><div class="bullet-dot" style="background:var(--scan)"></div><div>ובכל שלב בו נדרשת אינדיקציה נוספת לבחינת או שלילת תא שטח ויש אפשרות להטיס רחפן</div></li>
          </ul>
        </div>
      </div>

      <div class="section-block" style="animation-delay:0.1s">
        <div class="section-title" style="--cat-color: var(--scan)">סמכות מאשרת</div>
        <div class="info-card">
          <ul class="bullet-list">
            <li class="bullet-item"><div class="bullet-dot" style="background:var(--scan)"></div><div>מפקד פלוגת חילוץ או לפי בקשת מהנדס ו/או קמ"ן ו/או קה"א.</div></li>

function showScreen(id) {
  const data = SCREENS[id];
  if (!data) return;

  document.getElementById('content-title').textContent = data.title;
  document.getElementById('content-icon').textContent = data.icon;

  const body = document.getElementById('content-body');
  body.innerHTML = data.render();
  body.style.setProperty('--cat-color', data.color);

  document.getElementById('home').classList.remove('active');
  const cs = document.getElementById('content');
  cs.classList.add('active');

  // Force scroll to top after paint
  cs.scrollTop = 0;
  body.scrollTop = 0;
  window.scrollTo(0, 0);
  requestAnimationFrame(() => {
    cs.scrollTop = 0;
    body.scrollTop = 0;
    window.scrollTo(0, 0);
  });
}

function showHome() {
  document.getElementById('content').classList.remove('active');
  document.getElementById('home').classList.add('active');
  window.scrollTo(0, 0);
}
