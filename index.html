<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נוהל הפעלת רחפן EVO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');

:root {
  --bg: #ffffff;
  --surface: #f8f9fb;
  --border: #e5e7eb;
  --accent: #2563eb;
  --text-primary: #111827;
  --text-secondary: #6b7280;
}

/* בסיס */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Heebo',sans-serif;
  background:var(--bg);
  color:var(--text-primary);
}

/* מסכים */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* כותרת */
.home-header {
  padding:40px 20px 20px;
}

.home-title {
  font-size:32px;
  font-weight:900;
}

.home-subtitle {
  font-size:15px;
  color:var(--text-secondary);
  margin-top:6px;
}

/* רחפן (פשוט בלי אנימציה) */
.drone-visual {
  text-align:center;
  font-size:50px;
  margin:10px 0 20px;
}

/* קטגוריות */
.categories {
  padding:0 16px 30px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.cat-btn {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:17px;
  cursor:pointer;
}

/* מסך תוכן */
.content-header {
  position:sticky;
  top:0;
  background:white;
  border-bottom:1px solid var(--border);
  padding:14px;
  display:flex;
  align-items:center;
  gap:10px;
}

.back-btn {
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

.content-body {
  padding:20px;
}

/* Accordion */
.accordion-item {
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}

.accordion-header {
  padding:16px;
  background:var(--surface);
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
}

.accordion-arrow {
  transition:0.3s;
}

.accordion-item.active .accordion-arrow {
  transform:rotate(90deg);
}

.accordion-content {
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
  padding:0 16px;
}

.accordion-item.active .accordion-content {
  max-height:500px;
  padding:16px;
}

/* טקסט */
p, li {
  font-size:15px;
  line-height:1.8;
  color:#374151;
}

/* כפתור תחתון */
.bottom-back {
  padding:16px;
}

.bottom-back button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-size:16px;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-header">
    <h1 class="home-title">נוהל הפעלת רחפן EVO</h1>
    <p class="home-subtitle">מדריך מבצעי</p>
  </div>

  <div class="drone-visual">🛸</div>

  <div class="categories">
    <div class="cat-btn" onclick="showScreen('scan')">טכניקת סריקה</div>
    <div class="cat-btn" onclick="showScreen('build')">הרכבה</div>
    <div class="cat-btn" onclick="showScreen('safety')">בטיחות</div>
  </div>
</div>

<!-- CONTENT -->
<div id="content" class="screen">
  <div class="content-header">
    <button class="back-btn" onclick="showHome()">←</button>
    <div id="content-title"></div>
  </div>

  <div class="content-body" id="content-body"></div>

  <div class="bottom-back">
    <button onclick="showHome()">חזרה</button>
  </div>
</div>

<script>

const SCREENS = {
  scan: {
    title:'טכניקת סריקה',
    render: () => `
      ${accordion("עיתוי","הגעה לזירה, סריקות, הדממה ועוד")}
      ${accordion("תנאים","מזג אוויר, סוללות, תקשורת")}
    `
  },
  build: {
    title:'הרכבה',
    render: () => `
      ${accordion("שלב 1","טעינת סוללה")}
      ${accordion("שלב 2","פתיחת הרחפן")}
    `
  },
  safety: {
    title:'בטיחות',
    render: () => `
      ${accordion("כלל 1","אין להטיס מעל אנשים")}
      ${accordion("כלל 2","יש לשמור קשר עין")}
    `
  }
};

function accordion(title,content){
  return `
    <div class="accordion-item">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        ${title}
        <span class="accordion-arrow">▶</span>
      </div>
      <div class="accordion-content">
        <p>${content}</p>
      </div>
    </div>
  `;
}

function toggleAccordion(el){
  el.parentElement.classList.toggle('active');
}

/* ניווט */
function showScreen(id){
  const data = SCREENS[id];
  document.getElementById('content-title').innerText = data.title;
  document.getElementById('content-body').innerHTML = data.render();

  document.getElementById('home').classList.remove('active');
  document.getElementById('content').classList.add('active');

  window.scrollTo(0,0); // FIX חשוב
}

function showHome(){
  document.getElementById('content').classList.remove('active');
  document.getElementById('home').classList.add('active');
  window.scrollTo(0,0);
}

</script>

</body>
</html>
